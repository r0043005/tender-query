name: Fetch and Deploy Tenders

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'data/**'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Fetch Tenders Data
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests beautifulsoup4 cloudscraper brotli
          echo "--- Installed Packages ---"
          python -m pip list
          echo "--- Starting Scraper ---"
          python scripts/fetch_tenders.py --keyword "清" --output "data/tenders.json"
        
      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tenders.json
          if git diff --staged --quiet; then
            echo "資料沒有變化，不需要提交"
          else
            echo "資料有變化，正在提交..."
            git commit -m "Update tender data - $(date '+%Y-%m-%d %H:%M:%S')"
            git push origin main
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare distribution
        run: |
          mkdir -p dist/data
          cp index.html dist/
          cp data/tenders.json dist/data/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
