name: Daily Tender Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Fetch and Process
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install requests beautifulsoup4 cloudscraper brotli
          python3 scripts/fetch_tenders.py --keyword "清" --output "data/tenders.json"
        
      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tenders.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update tender data [skip ci]"
            git push origin main
          fi

      - name: Build Web Folder
        run: |
          mkdir -p public/data
          cp index.html public/
          cp data/tenders.json public/data/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages # 發布到 gh-pages 分支
