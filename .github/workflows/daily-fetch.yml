name: Fetch Daily Tenders

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  fetch-tenders:
    runs-on: ubuntu-latest
    # ▼ 修正 1：賦予 GitHub Actions 推送程式碼的寫入權限
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main # ▼ 修正 2：確保檢出的是 main 分支，以利後續 push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
          
      - name: Fetch tenders from Government Procurement Website
        run: |
          python scripts/fetch_tenders.py --keyword "清" --output "data/tenders.json"
        id: fetch
        
      - name: Commit and push if data changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          if git diff --quiet data/tenders.json; then
            echo "資料沒有變化，不需要提交"
          else
            echo "資料有變化，正在提交..."
            git add data/tenders.json
            git commit -m "Update tender data - $(date '+%Y-%m-%d %H:%M:%S')"
            git push origin main
          fi

  update-index:
    runs-on: ubuntu-latest
    needs: fetch-tenders

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main # ▼ 修正 3：直接檢出 main 分支，這樣就會自動拿到剛 push 的最新資料，不需要再執行 git pull

      - name: Copy data to dist
        run: |
          mkdir -p dist/data
          cp index.html dist/
          cp data/tenders.json dist/data/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: update-index
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
