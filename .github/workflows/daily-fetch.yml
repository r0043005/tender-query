name: Fetch Daily Tenders

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  fetch-tenders:
    runs-on: ubuntu-latest
    # ▼ 修正 1：賦予 GitHub Actions 推送程式碼的寫入權限
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main # ▼ 修正 2：確保檢出的是 main 分支，以利後續 push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      - name: Fetch tenders from openfun API
        run: |
          python3 << 'EOF'
          import requests
          import json
          import os

          keyword = "清"
          # 改用 openfun (ronnywang) 提供的穩定 API
          url = f"https://pcc-api.openfun.app/api/searchbytitle?query={keyword}"

          headers = {
              'Accept': 'application/json',
              'User-Agent': 'TenderFetchBot/2.0'
          }

          try:
              print(f"正在抓取: {url}")
              response = requests.get(url, headers=headers, timeout=30)

              if response.status_code == 200:
                  data = response.json()
                  # openfun 的資料放在 records 陣列中
                  records = data.get('records', [])
                  print(f"成功抓取 {len(records)} 筆資料")

                  # 將資料轉換成前端 index.html 原本預期的 mlwmlw 陣列格式
                  formatted_data = []
                  for r in records:
                      brief = r.get('brief', {})
                      detail = r.get('detail', {})
                      
                      # 提取預算並清洗逗號
                      budget = detail.get('已公告資料:預算金額') or detail.get('機關資料:預算金額') or 0
                      try:
                          budget = int(str(budget).replace(',', ''))
                      except:
                          budget = 0
                          
                      # 提取多種可能的截止日期欄位
                      deadline = detail.get('已公告資料:截止投標日期及時間') or detail.get('已公告資料:等標期限') or detail.get('已公告資料:截止收件日期') or ''
                      
                      # 重新組裝為舊版 API 格式
                      formatted_item = {
                          "job_no": r.get('job_number') or r.get('filename') or '',
                          "title": brief.get('title', '標案名稱'),
                          "org": r.get('unit_name') or '機關名稱',
                          "category": brief.get('category', '勞務類'),
                          "budget": budget,
                          "publish": r.get('date', ''),
                          "deadline": deadline,
                          "url": r.get('url') or f"https://pcc.g0v.ronny.tw/index/entry/{r.get('date')}/{r.get('filename')}"
                      }
                      formatted_data.append(formatted_item)

                  os.makedirs('data', exist_ok=True)
                  with open('data/tenders.json', 'w', encoding='utf-8') as f:
                      json.dump(formatted_data, f, ensure_ascii=False, indent=2)
                  print("已成功轉換格式並更新 data/tenders.json")
              else:
                  print(f"HTTP 錯誤: {response.status_code}")
          except Exception as e:
              print(f"抓取失敗: {e}")
              exit(1)
          EOF
        id: fetch
        
      - name: Commit and push if data changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          if git diff --quiet data/tenders.json; then
            echo "資料沒有變化，不需要提交"
          else
            echo "資料有變化，正在提交..."
            git add data/tenders.json
            git commit -m "Update tender data - $(date '+%Y-%m-%d %H:%M:%S')"
            git push origin main
          fi

  update-index:
    runs-on: ubuntu-latest
    needs: fetch-tenders

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main # ▼ 修正 3：直接檢出 main 分支，這樣就會自動拿到剛 push 的最新資料，不需要再執行 git pull

      - name: Copy data to dist
        run: |
          mkdir -p dist/data
          cp index.html dist/
          cp data/tenders.json dist/data/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: update-index
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
