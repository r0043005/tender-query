name: Fetch and Deploy Tenders

on:
  schedule:
    - cron: '0 0 * * *' # 每天凌晨執行
  workflow_dispatch: # 允許手動執行

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests beautifulsoup4 cloudscraper brotli
          
      - name: Fetch Tenders Data
        run: |
          python scripts/fetch_tenders.py --keyword "清" --output "data/tenders.json"
        
      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tenders.json
          if git diff --staged --quiet; then
            echo "沒有新數據。"
          else
            git commit -m "Update data [skip ci]"
            git push origin main
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare Files
        run: |
          mkdir -p dist/data
          cp index.html dist/
          cp data/tenders.json dist/data/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
